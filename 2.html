                }
            }
            
            // 开始动画循环
            function startAnimation() {
                animate();
            }
            
            // 设置鼠标控制（备用方案）
            function setupMouseControl() {
                let mouseX = 0.5;
                let mouseY = 0.5;
                let isMouseDown = false;
                
                document.addEventListener('mousemove', (event) => {
                    mouseX = event.clientX / window.innerWidth;
                    mouseY = event.clientY / window.innerHeight;
                    
                    if (isMouseDown) {
                        // 鼠标按下时控制缩放和旋转
                        const centerX = mouseX - 0.5;
                        const centerY = mouseY - 0.5;
                        const distanceFromCenter = Math.sqrt(centerX * centerX + centerY * centerY);
                        
                        // 控制缩放
                        targetScale = 0.5 + distanceFromCenter * 3;
                        scaleValue.textContent = targetScale.toFixed(2);
                        
                        // 控制旋转
                        targetRotationY = centerX * Math.PI * 2;
                        targetRotationX = centerY * Math.PI;
                        
                        // 更新旋转显示
                        rotationValue.textContent = `${Math.round(targetRotationY * 180 / Math.PI)}°`;
                        
                        // 模拟手指距离
                        const simulatedDistance = 20 + distanceFromCenter * 150;
                        handDistanceValue.textContent = simulatedDistance.toFixed(2);
                        fingersDetected.textContent = Math.floor(distanceFromCenter * 5);
                        
                        // 更新手部检测状态
                        handDetected = true;
                        handIndicator.classList.add('active');
                        handStatusText.textContent = '鼠标控制模式';
                    }
                });
                
                document.addEventListener('mousedown', () => {
                    isMouseDown = true;
                });
                
                document.addEventListener('mouseup', () => {
                    isMouseDown = false;
                    targetScale = 1.0;
                    handDetected = false;
                    handIndicator.classList.remove('active');
                    handStatusText.textContent = '鼠标已释放';
                });
                
                document.addEventListener('mouseleave', () => {
                    isMouseDown = false;
                    handDetected = false;
                    handIndicator.classList.remove('active');
                    handStatusText.textContent = '鼠标离开';
                    targetScale = 1.0;
                });
            }
            
            // 初始化摄像头
            async function initCamera() {
                try {
                    updateLoadingText("初始化视觉传感器...");
                    
                    // 尝试获取默认摄像头
                    const constraints = {
                        video: { 
                            width: { ideal: 640 }, 
                            height: { ideal: 480 },
                            facingMode: "user"
                        }
                    };
                    
                    // 检查浏览器是否支持媒体设备
                    if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                        throw new Error("浏览器不支持摄像头访问");
                    }
                    
                    const stream = await navigator.mediaDevices.getUserMedia(constraints);
                    currentStream = stream;
                    videoElement.srcObject = stream;
                    
                    // 等待视频加载
                    await new Promise((resolve) => {
                        videoElement.onloadedmetadata = () => {
                            // 设置canvas尺寸与视频一致
                            canvasElement.width = videoElement.videoWidth;
                            canvasElement.height = videoElement.videoHeight;
                            console.log("摄像头初始化成功");
                            resolve();
                        };
                    });
                    
                } catch (error) {
                    console.error("无法访问摄像头:", error);
                    updateLoadingText("视觉传感器初始化失败，使用备用模式");
                    
                    // 隐藏视频叠加层
                    document.querySelector('.video-overlay').style.display = 'none';
                    
                    // 启用备用控制模式
                    setTimeout(() => {
                        handStatusText.textContent = "摄像头不可用，启用鼠标控制";
                        setupMouseControl();
                    }, 1000);
                }
            }
            
            // 开始手势检测
            async function startHandDetection() {
                if (!handposeModel || detectionActive) return;
                
                detectionActive = true;
                startDetectionBtn.disabled = true;
                startDetectionBtn.textContent = "识别中...";
                stopDetectionBtn.disabled = false;
                
                handStatusText.textContent = "扫描手部特征...";
                handIndicator.classList.remove('active');
                
                console.log("开始手势检测");
                
                // 开始检测循环
                detectHands();
            }
            
            // 停止手势检测
            function stopHandDetection() {
                detectionActive = false;
                startDetectionBtn.disabled = false;
                startDetectionBtn.textContent = "启动识别";
                stopDetectionBtn.disabled = true;
                
                handStatusText.textContent = "系统待命";
                handIndicator.classList.remove('active');
                
                // 清除画布
                canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                
                console.log("停止手势检测");
            }
            
            // 检测手势 - 增加手部旋转检测
            async function detectHands() {
                if (!detectionActive || !handposeModel) return;
                
                try {
                    // 检测手部
                    predictions = await handposeModel.estimateHands(videoElement);
                    
                    // 清除画布
                    canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
                    
                    // 绘制视频帧
                    canvasCtx.save();
                    canvasCtx.scale(-1, 1);
                    canvasCtx.translate(-canvasElement.width, 0);
                    canvasCtx.drawImage(videoElement, 0, 0, canvasElement.width, canvasElement.height);
                    canvasCtx.restore();
                    
                    // 处理检测结果
                    if (predictions.length > 0) {
                        handDetected = true;
                        handIndicator.classList.add('active');
                        handStatusText.textContent = '手势识别中';
                        
                        // 绘制手部关键点
                        drawHand(predictions[0]);
                        
                        // 计算五指距离
                        const distance = calculateFingerDistance(predictions[0]);
                        
                        // 根据距离调整粒子缩放
                        updateParticleScale(distance);
                        
                        // 检测手部旋转
                        const rotation = calculateHandRotation(predictions[0]);
                        updateModelRotation(rotation);
                        
                    } else {
                        handDetected = false;
                        handIndicator.classList.remove('active');
                        handStatusText.textContent = '未检测到手部';
                        
                        // 如果没有检测到手，缓慢恢复到默认缩放
                        targetScale += (1.0 - targetScale) * 0.05;
                        
                        // 缓慢恢复到默认旋转
                        targetRotationX += (0 - targetRotationX) * 0.05;
                        targetRotationY += (0 - targetRotationY) * 0.05;
                    }
                    
                } catch (error) {
                    console.error("手势检测错误:", error);
                }
                
                // 继续下一帧检测
                if (detectionActive) {
                    requestAnimationFrame(detectHands);
                }
            }
            
            // 绘制手部关键点
            function drawHand(prediction) {
                const keypoints = prediction.landmarks;
                
                canvasCtx.save();
                canvasCtx.scale(-1, 1);
                canvasCtx.translate(-canvasElement.width, 0);
                
                // 绘制关键点
                for (let i = 0; i < keypoints.length; i++) {
                    const [x, y] = keypoints[i];
                    
                    // 创建渐变颜色
                    const gradient = canvasCtx.createRadialGradient(x, y, 0, x, y, 8);
                    gradient.addColorStop(0, '#ffffff');
                    gradient.addColorStop(0.5, '#00ffff');
                    gradient.addColorStop(1, 'transparent');
                    
                    canvasCtx.beginPath();
                    canvasCtx.arc(x, y, 8, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = gradient;
                    canvasCtx.fill();
                    
                    // 绘制内部点
                    canvasCtx.beginPath();
                    canvasCtx.arc(x, y, 2, 0, 2 * Math.PI);
                    canvasCtx.fillStyle = '#00ffaa';
                    canvasCtx.fill();
                }
                
                // 绘制关键点连线
                const connections = [
                    [0, 1], [1, 2], [2, 3], [3, 4], // 拇指
                    [0, 5], [5, 6], [6, 7], [7, 8], // 食指
                    [0, 9], [9, 10], [10, 11], [11, 12], // 中指
                    [0, 13], [13, 14], [14, 15], [15, 16], // 无名指
                    [0, 17], [17, 18], [18, 19], [19, 20], // 小指
                    [5, 9], [9, 13], [13, 17] // 手掌
                ];
                
                canvasCtx.strokeStyle = 'rgba(0, 255, 255, 0.6)';
                canvasCtx.lineWidth = 2;
                canvasCtx.lineCap = 'round';
                canvasCtx.lineJoin = 'round';
                
                for (const [start, end] of connections) {
                    const [x1, y1] = keypoints[start];
                    const [x2, y2] = keypoints[end];
                    
                    canvasCtx.beginPath();
                    canvasCtx.moveTo(x1, y1);
                    canvasCtx.lineTo(x2, y2);
                    canvasCtx.stroke();
                }
                
                canvasCtx.restore();
            }
            
            // 计算五指距离
            function calculateFingerDistance(prediction) {
                const keypoints = prediction.landmarks;
                
                // 获取五个指尖的坐标
                const thumbTip = keypoints[fingerTips.thumb];
                const indexTip = keypoints[fingerTips.index];
                const middleTip = keypoints[fingerTips.middle];
                const ringTip = keypoints[fingerTips.ring];
                const pinkyTip = keypoints[fingerTips.pinky];
                
                const fingertips = [thumbTip, indexTip, middleTip, ringTip, pinkyTip];
                
                // 计算五个指尖之间的平均距离
                let totalDistance = 0;
                let pairCount = 0;
                
                for (let i = 0; i < fingertips.length; i++) {
                    for (let j = i + 1; j < fingertips.length; j++) {
                        const [x1, y1] = fingertips[i];
                        const [x2, y2] = fingertips[j];
                        
                        const dx = x1 - x2;
                        const dy = y1 - y2;
                        totalDistance += Math.sqrt(dx * dx + dy * dy);
                        pairCount++;
                    }
                }
                
                const avgDistance = totalDistance / pairCount;
                
                // 更新UI显示
                handDistanceValue.textContent = avgDistance.toFixed(2);
                fingersDetected.textContent = fingertips.length;
                
                return avgDistance;
            }
            
            // 计算手部旋转角度
            function calculateHandRotation(prediction) {
                const keypoints = prediction.landmarks;
                
                // 使用手腕(0)和手掌中心(9)的连线计算手部角度
                const wrist = keypoints[0];
                const palmCenter = keypoints[9];
                
                // 计算手腕到手掌中心的向量
                const dx = palmCenter[0] - wrist[0];
                const dy = palmCenter[1] - wrist[1];
                
                // 计算角度（弧度）
                let angle = Math.atan2(dy, dx);
                
                // 将角度标准化到0-2π
                if (angle < 0) angle += Math.PI * 2;
                
                // 计算角度变化量
                const angleDelta = angle - lastHandAngle;
                lastHandAngle = angle;
                
                // 返回旋转信息
                return {
                    angle: angle,
                    delta: angleDelta,
                    wrist: wrist,
                    palmCenter: palmCenter
                };
            }
            
            // 根据手部旋转更新模型旋转
            function updateModelRotation(rotationInfo) {
                // 手部旋转控制Y轴旋转（水平旋转）
                // 手掌向上时角度为0，手掌向右时角度为π/2，以此类推
                
                // 映射手部角度到模型旋转
                // 手掌向上（手背朝向摄像头） -> 模型正面
                // 手掌向右 -> 模型向右旋转90度
                // 手掌向下 -> 模型背面
                // 手掌向左 -> 模型向左旋转90度
                
                // 计算目标旋转角度
                const targetYRotation = rotationInfo.angle;
                
                // 平滑过渡到目标旋转
                targetRotationY += (targetYRotation - targetRotationY) * 0.1;
                
                // 也可以根据手部移动速度调整旋转速度
                const rotationSpeed = Math.min(Math.abs(rotationInfo.delta) * 10, 0.5);
                targetRotationY += rotationInfo.delta * rotationSpeed;
                
                // 更新UI显示
                const degrees = Math.round(targetRotationY * 180 / Math.PI);
                rotationValue.textContent = `${degrees}°`;
            }
            
            // 根据手指距离更新粒子缩放
            function updateParticleScale(distance) {
                // 将距离映射到缩放比例
                // 距离越大（五指张开），缩放越大
                // 距离越小（五指并拢），缩放越小
                
                const sensitivity = sensitivitySlider.value / 100;
                const minDistance = 15 * sensitivity;
                const maxDistance = 120 * sensitivity;
                
                let normalizedDistance = (distance - minDistance) / (maxDistance - minDistance);
                normalizedDistance = Math.max(0, Math.min(1, normalizedDistance));
                
                // 反转：距离越大，缩放越大
                targetScale = 0.8 + normalizedDistance * 2.2; // 缩放范围：0.8-3.0
                
                // 更新UI显示
                // scaleValue.textContent = targetScale.toFixed(2);
            }
            
            // 更新加载文本
            function updateLoadingText(text) {
                loadingText.textContent = text;
                console.log(text);
            }
            
            // 切换全屏模式
            function toggleFullscreen() {
                if (!isFullscreen) {
                    const elem = document.documentElement;
                    if (elem.requestFullscreen) {
                        elem.requestFullscreen();
                    } else if (elem.mozRequestFullScreen) { /* Firefox */
                        elem.mozRequestFullScreen();
                    } else if (elem.webkitRequestFullscreen) { /* Chrome, Safari & Opera */
                        elem.webkitRequestFullscreen();
                    } else if (elem.msRequestFullscreen) { /* IE/Edge */
                        elem.msRequestFullscreen();
                    }
                    isFullscreen = true;
                } else {
                    if (document.exitFullscreen) {
                        document.exitFullscreen();
                    } else if (document.mozCancelFullScreen) { /* Firefox */
                        document.mozCancelFullScreen();
                    } else if (document.webkitExitFullscreen) { /* Chrome, Safari & Opera */
                        document.webkitExitFullscreen();
                    } else if (document.msExitFullscreen) { /* IE/Edge */
                        document.msExitFullscreen();
                    }
                    isFullscreen = false;
                }
            }
            
            // 初始化滑块事件
            function initSliderEvents() {
                // 灵敏度滑块
                sensitivitySlider.addEventListener('input', function() {
                    const value = this.value;
                    sensitivityValue.textContent = value + '%';
                    updateSliderTrack(this, sensitivityTrack);
                });
                
                // 粒子扩散度滑块
                particleSpreadSlider.addEventListener('input', function() {

                    particleSpreadValue.textContent = particleParams.particleSpread.toFixed(2);

                });
                
                // 粒子数量滑块
                particleCountSlider.addEventListener('input', function() {

                    particleCountValue.textContent = particleParams.count.toLocaleString();
                    updateSliderTrack(this, particleCountTrack);

                // 粒子大小滑块
                particleSizeSlider.addEventListener('input', function() {

                    particleSizeValue.textContent = particleParams.baseSize.toFixed(2);
                    updateSliderTrack(this, particleSizeTrack);
                    if (particleSystem) {
                        particleSystem.material.size = particleParams.baseSize;
                    }
                });
                
                // 粒子速度滑块
                particleSpeedSlider.addEventListener('input', function() {
                    particleParams.speed = parseFloat(this.value);
                    particleSpeedValue.textContent = particleParams.speed.toFixed(1);
                    updateSliderTrack(this, particleSpeedTrack);
                });
                
                // 形状强度滑块
                shapeStrengthSlider.addEventListener('input', function() {
                    particleParams.shapeStrength = parseFloat(this.value);
                    shapeStrengthValue.textContent = particleParams.shapeStrength.toFixed(2);
                    updateSliderTrack(this, shapeStrengthTrack);
                    createParticles();
                });
                
                // 色调滑块
                hueSlider.addEventListener('input', function() {
                    particleParams.hue = parseFloat(this.value);
                    particleParams.colorMode = 'custom';
                    hueValue.textContent = particleParams.hue.toFixed(2);
                    updateSliderTrack(this, hueTrack);
                    createParticles();
                });
                
                // 饱和度滑块
                saturationSlider.addEventListener('input', function() {
                    particleParams.saturation = parseFloat(this.value);
                    particleParams.colorMode = 'custom';
                    saturationValue.textContent = particleParams.saturation.toFixed(2);
                    updateSliderTrack(this, saturationTrack);
                    createParticles();
                });
                
                // 亮度滑块
                brightnessSlider.addEventListener('input', function() {
                    particleParams.brightness = parseFloat(this.value);
                    particleParams.colorMode = 'custom';
                    brightnessValue.textContent = particleParams.brightness.toFixed(2);
                    updateSliderTrack(this, brightnessTrack);
                    createParticles();
                });
                
                // 颜色选择器
                colorOptions.forEach(option => {
                    option.addEventListener('click', function() {
                        // 移除所有按钮的active类
                        colorOptions.forEach(opt => opt.classList.remove('active'));
                        // 给当前按钮添加active类
                        this.classList.add('active');
                        // 更新颜色模式
                        particleParams.colorMode = this.dataset.color;
                        // 根据颜色模式设置HSL值
                        switch(particleParams.colorMode) {
                            case 'red':
                                particleParams.hue = 0.9;
                                particleParams.saturation = 0.8;
                                particleParams.brightness = 0.7;
                                break;
                            case 'cyan':
                                particleParams.hue = 0.5;
                                particleParams.saturation = 0.8;
                                particleParams.brightness = 0.7;
                                break;
                            case 'pink':
                                particleParams.hue = 0.9;
                                particleParams.saturation = 0.7;
                                particleParams.brightness = 0.8;
                                break;
                            case 'yellow':
                                particleParams.hue = 0.15;
                                particleParams.saturation = 0.8;
                                particleParams.brightness = 0.7;
                                break;
                        }
                        
                        // 更新滑块值
                        hueSlider.value = particleParams.hue;
                        saturationSlider.value = particleParams.saturation;
                        brightnessSlider.value = particleParams.brightness;
                        
                        // 更新滑块显示
                        hueValue.textContent = particleParams.hue.toFixed(2);
                        saturationValue.textContent = particleParams.saturation.toFixed(2);
                        brightnessValue.textContent = particleParams.brightness.toFixed(2);
                        
                        updateSliderTrack(hueSlider, hueTrack);
                        updateSliderTrack(saturationSlider, saturationTrack);
                        updateSliderTrack(brightnessSlider, brightnessTrack);
                        
                        // 重新创建粒子
                        createParticles();
                    });
                });
                
                // 形状选择器
                shapeOptions.forEach(option => {
                    option.addEventListener('click', function() {
                        // 移除所有按钮的active类
                        shapeOptions.forEach(opt => opt.classList.remove('active'));
                        // 给当前按钮添加active类
                        this.classList.add('active');
                        // 更新形状模式
                        particleParams.shapeMode = this.dataset.shape;
                        // 重新创建粒子
                        createParticles();
                    });
                });
            }
            
            // 初始化事件监听
            function initEventListeners() {
                // 开始检测
                startDetectionBtn.addEventListener('click', startHandDetection);
                
                // 停止检测
                stopDetectionBtn.addEventListener('click', stopHandDetection);
                
                // 全屏按钮
                fullscreenBtn.addEventListener('click', toggleFullscreen);
                
                // 窗口大小变化
                window.addEventListener('resize', onWindowResize);
                
                // 全屏变化监听
                document.addEventListener('fullscreenchange', () => {
                    isFullscreen = !!document.fullscreenElement;
                });
                
                // 初始禁用停止按钮
                stopDetectionBtn.disabled = true;
                
                // 初始化滑块事件
                initSliderEvents();
            }
            
            // 初始化应用
            async function initApp() {
                try {
                    // 创建数据流效果
                    createDataStream();
                    
                    // 初始化滑块轨道
                    updateSliderTrack(sensitivitySlider, sensitivityTrack);
                    updateSliderTrack(particleSpreadSlider, particleSpreadTrack);
                    updateSliderTrack(particleCountSlider, particleCountTrack);
                    updateSliderTrack(particleSizeSlider, particleSizeTrack);
                    updateSliderTrack(particleSpeedSlider, particleSpeedTrack);
                    updateSliderTrack(shapeStrengthSlider, shapeStrengthTrack);
                    updateSliderTrack(hueSlider, hueTrack);
                    updateSliderTrack(saturationSlider, saturationTrack);
                    updateSliderTrack(brightnessSlider, brightnessTrack);
                    
                    // 初始化Three.js
                    await initThreeJS();
                    
                    // 初始化事件监听
                    initEventListeners();
                    
                    // 初始化摄像头
                    await initCamera();
                    
                    // 初始化TensorFlow.js Handpose模型
                    await initHandposeModel();
                    
                } catch (error) {
                    console.error("应用初始化失败:", error);
                    updateLoadingText("系统初始化失败: " + error.message);
                    
                    // 显示错误信息
                    setTimeout(() => {
                        loadingElement.style.display = 'none';
                        startAnimation();
                        handStatusText.textContent = "系统错误，启用备用模式";
                        startDetectionBtn.style.display = 'none';
                        setupMouseControl();
                    }, 2000);
                }
            }
            
            // 启动应用
            initApp();
        });
    </script>
</body>
</html>
